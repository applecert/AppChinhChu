name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: Cài đặt lõi C++ (CocoaPods)
        run: |
          cd ios
          pod install

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXCLUDED_ARCHS="x86_64" CONFIGURATION_BUILD_DIR=$PWD/build build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/build/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
