name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật C++ Tận Gốc (Khôi phục Mạch Máu)
        run: |
          echo "BẮT ĐẦU VÁ LỖI C++..."
          
          cd modules/ipa-signer/ios
          
          # 1. Đảm bảo tên file không đụng hàng với React Native
          if [ -f "openssl.h" ]; then
            mv openssl.h zsign_openssl.h
          fi
          if [ -f "openssl.cpp" ]; then
            mv openssl.cpp zsign_openssl.cpp
          fi
          
          # Đổi tên gọi cũ thành tên mới
          find . -type f -name "*.*" -exec sed -i '' 's/#include "openssl.h"/#include "zsign_openssl.h"/g' {} +
          
          # Bơm lại Mạch máu (zsign_openssl.h) vào đầu các file bị đứt liên lạc
          for file in archo.h macho.h bundle.h signing.h signing.cpp; do
            if ! grep -q "zsign_openssl.h" "$file"; then
              echo '#include "zsign_openssl.h"' > temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 2. Thiến lệnh system() trong util.cpp gây ngất xỉu trên iOS
          sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' common/util.cpp
          
          # 3. Tiêu diệt zsign.cpp (File CLI chạy trên máy Mac, gây nổ cỗ máy iOS)
          rm -f zsign.cpp
          
          cd ../../..
          
          # 4. Cài CocoaPods
          cd ios
          pod install
          
          # 5. Dọn rác C++ trong Umbrella Header (Cực kỳ chính xác, không xóa nhầm)
          echo "🔥 BẮT ĐẦU CÀN QUÉT UMBRELLA..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
