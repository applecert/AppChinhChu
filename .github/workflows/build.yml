name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: 🗑️ Phẫu thuật C++ & Quét sạch Umbrella
        run: |
          # 1. Tiêu diệt zsign.cpp (Tránh thảm họa)
          rm -f modules/ipa-signer/ios/zsign.cpp
          
          # 2. VÔ HIỆU HÓA lệnh system() bị cấm trên iOS trong file util.cpp
          sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' modules/ipa-signer/ios/common/util.cpp
          
          cd ios
          pod install
          
          echo "🔥 BẮT ĐẦU CÀN QUÉT UMBRELLA..."
          # 3. Quét sạch mọi C++ lọt lưới
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import ".*\.h"/d' {} +

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
