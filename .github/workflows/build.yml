name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Npm Install
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: Step 1 - Don Dep Va Chuan Bi
        run: |
          cd modules/ipa-signer/ios
          
          # Dọn dẹp rác C++
          rm -f zsign.cpp || true
          [ -f openssl.h ] && mv openssl.h zsign_openssl.h || true
          [ -f openssl.cpp ] && mv openssl.cpp zsign_openssl.cpp || true
          
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} + || true
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/<openssl\.h>/"zsign_openssl.h"/g' {} + || true
          
          # Đổi chuẩn tên gọi minizip để lấy hàng từ CocoaPods
          find . -type f -exec sed -i '' 's/<zip\.h>/<minizip\/zip\.h>/g' {} + || true
          find . -type f -exec sed -i '' 's/<unzip\.h>/<minizip\/unzip\.h>/g' {} + || true
          find . -type f -exec sed -i '' 's/"zip\.h"/<minizip\/zip\.h>/g' {} + || true
          find . -type f -exec sed -i '' 's/"unzip\.h"/<minizip\/unzip\.h>/g' {} + || true
          
          find . -type f -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0;/g' {} + || true

          # Tiêm kháng thể giải quyết vòng lặp ZSignAsset và stdint
          python3 -c "
          import os

          if os.path.exists('signing.h'):
              with open('signing.h', 'r') as file: c = file.read()
              if '#include <stdint.h>' not in c:
                  injection = \"\"\"#pragma once\n#include <stdint.h>\n#include <string>\n#include <vector>\nusing namespace std;\n\"\"\"
                  with open('signing.h', 'w') as file: file.write(injection + c.replace('#pragma once', ''))

          for f in ['archo.h', 'macho.h', 'bundle.h']:
              if os.path.exists(f):
                  with open(f, 'r') as file: c = file.read()
                  if 'class ZSignAsset;' not in c:
                      with open(f, 'w') as file: file.write('#pragma once\nclass ZSignAsset;\n' + c.replace('#pragma once', ''))
          
          if os.path.exists('signing.cpp'):
              with open('signing.cpp', 'r') as file: c = file.read()
              if '#include \"signing.h\"' not in c:
                  with open('signing.cpp', 'w') as file: file.write('#include \"signing.h\"\n' + c)
          "

      - name: Step 2 - Patch Podspec (Lay Minizip Chinh Chu)
        run: |
          cat << 'EOF' > patch_podspec.py
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f: c = f.read()
              if 'OpenSSL-Universal' not in c:
                  idx = c.rfind('end')
                  if idx != -1:
                      # Ép cài minizip từ kho Apple
                      c = c[:idx] + "\n  s.dependency 'OpenSSL-Universal'\n  s.dependency 'minizip'\n  s.libraries = 'z'\n" + c[idx:]
                      with open(pod, 'w') as f: f.write(c)
          EOF
          python3 patch_podspec.py

      - name: Step 3 - Pod Install
        run: |
          cd ios
          pod install

      - name: Step 4 - Clean Umbrella Header
        run: |
          cat << 'EOF' > clean_umbrella.py
          import os, glob
          print("--- BAT DAU DON DEP ---")
          umbrella_files = glob.glob('ios/Pods/**/IpaSigner-umbrella.h', recursive=True)
          for u_file in umbrella_files:
              with open(u_file, 'r') as f: lines = f.readlines()
              with open(u_file, 'w') as f:
                  for line in lines:
                      if line.startswith('#import "') or line.startswith('#import <IpaSigner/'):
                          if 'IpaSignerModule' in line or 'IpaSignerView' in line or 'ZSignWrapper' in line or 'Expo' in line:
                              f.write(line)
                      else:
                          f.write(line)
          print("--- HOAN THANH ---")
          EOF
          python3 clean_umbrella.py

      - name: Step 5 - Xcode Build
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Step 6 - Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Step 7 - Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
