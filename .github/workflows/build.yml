name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật C++ Tận Gốc (Hồi Sinh & Nối Mạch Máu)
        run: |
          echo "BẮT ĐẦU VÁ LỖI C++..."
          
          cd modules/ipa-signer/ios
          
          # 1. PHÉP THUẬT HỒI SINH: Tải lại 2 file quan trọng nhất mà Sếp lỡ tay xóa mất
          if [ ! -f "openssl.h" ] && [ ! -f "zsign_openssl.h" ]; then
            echo "Đang tải lại zsign_openssl.h từ máy chủ gốc..."
            curl -sSL -o zsign_openssl.h https://raw.githubusercontent.com/zhlynn/zsign/master/openssl.h
          fi
          
          if [ ! -f "openssl.cpp" ] && [ ! -f "zsign_openssl.cpp" ]; then
            echo "Đang tải lại zsign_openssl.cpp từ máy chủ gốc..."
            curl -sSL -o zsign_openssl.cpp https://raw.githubusercontent.com/zhlynn/zsign/master/openssl.cpp
          fi
          
          # 2. Đổi tên nếu file cũ vẫn lẩn trốn (tránh đụng hàng React Native)
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          
          # 3. Đồng bộ hóa toàn bộ tên gọi mới trong dự án
          find . -type f -name "*.*" -exec sed -i '' 's/#include "openssl.h"/#include "zsign_openssl.h"/g' {} +
          
          # 4. Nối lại Mạch máu vào đầu các file bị đứt liên lạc
          for file in archo.h macho.h bundle.h signing.h signing.cpp; do
            if [ -f "$file" ] && ! grep -q "zsign_openssl.h" "$file"; then
              echo '#include "zsign_openssl.h"' > temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 5. Thiến lệnh system() trong util.cpp gây ngất xỉu trên iOS
          if [ -f "common/util.cpp" ]; then
            sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' common/util.cpp
          fi
          
          # 6. Tiêu diệt zsign.cpp (File rác chạy trên máy Mac, gây nổ cỗ máy iOS)
          rm -f zsign.cpp
          
          cd ../../..
          
          # 7. Cài CocoaPods (Đóng gói lại với file vừa hồi sinh)
          cd ios
          pod install
          
          # 8. Dọn rác C++ trong Umbrella Header
          echo "🔥 BẮT ĐẦU CÀN QUÉT UMBRELLA..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
