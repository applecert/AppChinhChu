name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Rèn Vũ Khí & Phẫu thuật C++ (CHỐT HẠ THẬT SỰ)
        run: |
          echo "BẮT ĐẦU RÈN LIBZIP VÀ XỬ LÝ C++..."
          
          # 1. TỰ ĐỘNG ĐÚC LIBZIP TỪ MÃ NGUỒN CHO CHIP iPHONE (ARM64)
          echo "Đang rèn libzip.a..."
          curl -L -o libzip.tar.gz https://github.com/nih-at/libzip/releases/download/v1.9.2/libzip-1.9.2.tar.gz
          tar -xzf libzip.tar.gz
          cd libzip-1.9.2
          mkdir build && cd build
          cmake .. -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_SHARED_LIBS=OFF -DENABLE_BZIP2=OFF -DENABLE_LZMA=OFF -DENABLE_ZSTD=OFF -DENABLE_OPENSSL=OFF -DCMAKE_INSTALL_PREFIX=../../modules/ipa-signer/ios/libzip_ios
          make -j4
          make install
          cd ../..
          
          # 2. CHỈNH SỬA PODSPEC ĐỂ TRANG BỊ VŨ KHÍ VỪA RÈN & OPENSSL
          PODSPEC=$(find modules -name "*.podspec" | head -n 1)
          if [ -n "$PODSPEC" ]; then
            # Xóa sạch các vết tích tiêm hỏng trước đó
            perl -pi -e 's/.*s\.dependency "libzip.*//g' "$PODSPEC"
            perl -pi -e 's/.*s\.dependency "OpenSSL.*//g' "$PODSPEC"
            perl -pi -e 's/.*vendored_libraries.*//g' "$PODSPEC"
            perl -pi -e 's/.*pod_target_xcconfig.*//g' "$PODSPEC"
            
            # Trang bị libzip tĩnh và OpenSSL-Universal vào file Podspec
            perl -pi -e 's/(s\.name.*)/$1\n  s.dependency "OpenSSL-Universal"\n  s.libraries = "z"\n  s.vendored_libraries = "ios\/libzip_ios\/lib\/libzip.a"\n  s.pod_target_xcconfig = { "HEADER_SEARCH_PATHS" => "\"$(PODS_TARGET_SRCROOT)\/ios\/libzip_ios\/include\"" }/g' "$PODSPEC"
            echo "Đã trang bị xong libzip.a và OpenSSL vào dự án!"
          fi
          
          cd modules/ipa-signer/ios
          
          # 3. Đổi tên openssl tránh xung đột
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          # 4. Bổ sung thư viện chuẩn STL C++
          for file in archo.h macho.h bundle.h signing.h; do
            if [ -f "$file" ]; then
              sed -i '' '/#include <set>/d' "$file"
              sed -i '' '/#include <string>/d' "$file"
              sed -i '' '/#include <vector>/d' "$file"
              sed -i '' '/using namespace std;/d' "$file"
              
              echo '#include <set>' > temp_file
              echo '#include <string>' >> temp_file
              echo '#include <vector>' >> temp_file
              echo 'using namespace std;' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 5. Ép cấu trúc Include tĩnh chặn đứng lỗi "không hiểu từ vựng"
          for file in archo.cpp bundle.cpp macho.cpp signing.cpp; do
            if [ -f "$file" ]; then
              sed -i '' '/#include "signing\.h"/d' "$file"
              sed -i '' '/#include "zsign_openssl\.h"/d' "$file"
              sed -i '' '/#include "common\/json\.h"/d' "$file"
              sed -i '' '/#include "macho\.h"/d' "$file"
              
              echo '#include "common/json.h"' > temp_file
              echo '#include "zsign_openssl.h"' >> temp_file
              echo '#include "macho.h"' >> temp_file
              echo '#include "signing.h"' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 6. Vô hiệu hóa lệnh system() macOS gây sập trên iOS
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          
          # 7. Tiêu diệt zsign.cpp
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          # 8. Pod Install
          cd ios
          pod install
          
          # 9. Dọn dẹp Umbrella Header
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
