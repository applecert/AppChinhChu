name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật C++ & Bơm Thư Viện Zip (CHỐT HẠ AN TOÀN)
        run: |
          echo "BẮT ĐẦU XỬ LÝ C++ VÀ BƠM LIBZIP..."
          
          # --- SỬA LỖI ĐỘT QUỴ 2 PHÚT (Thay sed bằng perl an toàn 100%) ---
          PODSPEC=$(find modules -name "*.podspec" | head -n 1)
          if [ -n "$PODSPEC" ]; then
            # Xóa sạch các mầm mống lỗi tiêm trước đó
            perl -pi -e 's/.*s\.dependency "libzip-c".*\n//g' "$PODSPEC"
            perl -pi -e 's/.*s\.dependency "libzip".*\n//g' "$PODSPEC"
            # Tiêm libzip chuẩn bằng Perl (Không bao giờ lỗi gõ phím)
            perl -pi -e 's/(s\.name.*)/$1\n  s.dependency "libzip"/g' "$PODSPEC"
            echo "Đã tiêm libzip an toàn vào $PODSPEC"
          fi
          
          cd modules/ipa-signer/ios
          
          # 1. Đổi tên openssl tránh xung đột thư viện React Native
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          # 2. Bổ sung thư viện chuẩn STL vào tất cả file header (.h)
          for file in archo.h macho.h bundle.h signing.h; do
            if [ -f "$file" ]; then
              sed -i '' '/#include <set>/d' "$file"
              sed -i '' '/#include <string>/d' "$file"
              sed -i '' '/#include <vector>/d' "$file"
              sed -i '' '/using namespace std;/d' "$file"
              
              echo '#include <set>' > temp_file
              echo '#include <string>' >> temp_file
              echo '#include <vector>' >> temp_file
              echo 'using namespace std;' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 3. Ép cấu trúc Include tĩnh cho các file .cpp để chống lỗi Undeclared Identifier
          for file in archo.cpp bundle.cpp macho.cpp signing.cpp; do
            if [ -f "$file" ]; then
              sed -i '' '/#include "signing\.h"/d' "$file"
              sed -i '' '/#include "zsign_openssl\.h"/d' "$file"
              sed -i '' '/#include "common\/json\.h"/d' "$file"
              sed -i '' '/#include "macho\.h"/d' "$file"
              
              echo '#include "common/json.h"' > temp_file
              echo '#include "zsign_openssl.h"' >> temp_file
              echo '#include "macho.h"' >> temp_file
              echo '#include "signing.h"' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 4. Vô hiệu hóa hàm system() không được phép dùng trên iOS
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          
          # 5. Xóa bỏ file CLI chạy trên macOS
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          # 6. Pod Install (TỰ ĐỘNG CẬP NHẬT KHO ĐỂ KHÔNG BỊ OUT-OF-DATE NỮA)
          cd ios
          pod install --repo-update
          
          # 7. Dọn dẹp Umbrella Header
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
