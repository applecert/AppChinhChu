name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật & Bơm Minizip (SẠCH SẼ 100%)
        run: |
          echo "1. BƠM TRỰC TIẾP THƯ VIỆN MINIZIP VÀO LÕI..."
          mkdir -p modules/ipa-signer/ios/minizip
          cd modules/ipa-signer/ios/minizip
          BASE_URL="https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip"
          curl -sLO $BASE_URL/unzip.h
          curl -sLO $BASE_URL/unzip.c
          curl -sLO $BASE_URL/zip.h
          curl -sLO $BASE_URL/zip.c
          curl -sLO $BASE_URL/ioapi.h
          curl -sLO $BASE_URL/ioapi.c
          curl -sLO $BASE_URL/crypt.h
          cd ../../../..
          
          echo "2. TIÊM PODSPEC SIÊU TỐI GIẢN (KHÔNG PHÁ CODE CŨ)..."
          cat << 'EOF' > patch_podspec.py
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f:
                  content = f.read()
              
              # Chỉ tìm chữ 'end' cuối cùng của file và chèn vào ngay trước nó
              idx = content.rfind('end')
              if idx != -1:
                  injection = "\n  s.dependency 'OpenSSL-Universal'\n  s.libraries = 'z'\n"
                  content = content[:idx] + injection + content[idx:]
                  
              with open(pod, 'w') as f:
                  f.write(content)
          EOF
          python3 patch_podspec.py
          
          echo "3. XỬ LÝ ĐƯỜNG DẪN C++ VÀ MINIZIP..."
          cd modules/ipa-signer/ios
          
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          # Đổi lệnh gọi zip cũ thành gọi trực tiếp vào thư mục minizip vừa tải
          find . -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<zip\.h>/"minizip\/zip.h"/g' {} +
          find . -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<unzip\.h>/"minizip\/unzip.h"/g' {} +
          
          # Bơm thư viện chuẩn C++ (Chữa lỗi unknown type)
          for file in archo.h macho.h bundle.h signing.h; do
            if [ -f "$file" ]; then
              sed -i '' '/#include <set>/d' "$file"
              sed -i '' '/#include <string>/d' "$file"
              sed -i '' '/#include <vector>/d' "$file"
              sed -i '' '/using namespace std;/d' "$file"
              
              echo '#include <set>' > temp_file
              echo '#include <string>' >> temp_file
              echo '#include <vector>' >> temp_file
              echo 'using namespace std;' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # Sắp xếp Include chuẩn xác
          for file in archo.cpp bundle.cpp macho.cpp signing.cpp; do
            if [ -f "$file" ]; then
              sed -i '' '/#include "signing\.h"/d' "$file"
              sed -i '' '/#include "zsign_openssl\.h"/d' "$file"
              sed -i '' '/#include "common\/json\.h"/d' "$file"
              sed -i '' '/#include "macho\.h"/d' "$file"
              
              echo '#include "common/json.h"' > temp_file
              echo '#include "zsign_openssl.h"' >> temp_file
              echo '#include "macho.h"' >> temp_file
              echo '#include "signing.h"' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          echo "4. CÀI ĐẶT COCOAPODS..."
          cd ios
          pod install
          
          echo "5. DỌN DẸP UMBRELLA HEADER..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*|zip|unzip|ioapi|crypt)\.h"/d' {} +

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
