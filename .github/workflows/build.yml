name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: 💉 Phẫu thuật vá lỗi C++ tự động (Không cần Sếp động tay)
        run: |
          echo "BẮT ĐẦU BƠM KHÁNG SINH CHỮA MẤT TRÍ NHỚ..."
          cd modules/ipa-signer/ios
          
          # 1. Bơm định nghĩa ZSignAsset vào đầu 3 file này để nó hết ngơ ngác
          for file in archo.h macho.h bundle.h; do
            echo "class ZSignAsset;" > temp_file
            cat "$file" >> temp_file
            mv temp_file "$file"
          done
          
          # 2. Bơm file signing.h vào đầu zsign.cpp
          echo "#include \"signing.h\"" > temp_file
          cat zsign.cpp >> temp_file
          mv temp_file zsign.cpp
          
          # 3. Cắt phăng cái dòng gọi hàm CheckSignature gây sập máy (Thay bằng return 0)
          sed -i '' 's/.*CheckSignature.*/    return 0;/g' zsign.cpp
          
          cd ../../..

      - name: Cài đặt lõi C++ & Kích hoạt Vũ khí Hạt nhân
        run: |
          cd ios
          pod install
          echo "🔥 BẮT ĐẦU CÀN QUÉT UMBRELLA..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|openssl|sha.*|signing|sys|timer|util.*|zsign.*)\.h/d' {} +
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "[a-z0-9_]+\.h"/d' {} +

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
