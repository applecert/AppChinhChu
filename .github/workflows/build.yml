name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ⚡ Bộ nhớ đệm (Bỏ qua thời gian tải)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ios/Pods
          key: ${{ runner.os }}-expo-build-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-expo-build-

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ BƯỚC 1: DỌN DẸP VÀ CHUẨN BỊ VŨ KHÍ
        run: |
          echo "Tải thư viện nén Minizip..."
          cd modules/ipa-signer/ios
          mkdir -p minizip
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/unzip.h -o minizip/unzip.h
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/unzip.c -o minizip/unzip.c
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/zip.h -o minizip/zip.h
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/zip.c -o minizip/zip.c
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/ioapi.h -o minizip/ioapi.h
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/ioapi.c -o minizip/ioapi.c
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/crypt.h -o minizip/crypt.h

          echo "Xử lý file rác và chống xung đột..."
          rm -f zsign.cpp
          [ -f openssl.h ] && mv openssl.h zsign_openssl.h
          [ -f openssl.cpp ] && mv openssl.cpp zsign_openssl.cpp

          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/<openssl\.h>/"zsign_openssl.h"/g' {} +

          find . -maxdepth 1 -type f -exec sed -i '' 's/<zip\.h>/"minizip\/zip.h"/g' {} +
          find . -maxdepth 1 -type f -exec sed -i '' 's/<unzip\.h>/"minizip\/unzip.h"/g' {} +
          find common -type f -exec sed -i '' 's/<zip\.h>/"..\/minizip\/zip.h"/g' {} +
          find common -type f -exec sed -i '' 's/<unzip\.h>/"..\/minizip\/unzip.h"/g' {} +

          [ -f "util.cpp" ] && sed -i '' 's/int status = system(.*);/int status = 0;/g' util.cpp

      - name: 🛠️ BƯỚC 2: CẤP QUYỀN PODSPEC
        run: |
          python3 -c "
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f: c = f.read()
              if 'OpenSSL-Universal' not in c:
                  c = c[:c.rfind('end')] + \"\n  s.dependency 'OpenSSL-Universal'\n  s.libraries = 'z'\n\" + c[c.rfind('end'):]
                  with open(pod, 'w') as f: f.write(c)
          "

      - name: 🛠️ BƯỚC 3: CÀI ĐẶT COCOAPODS
        run: |
          cd ios
          pod install

      - name: 💣 BƯỚC 4: RÚT CỦI ĐÁY NỒI (SIÊU ĐỘT PHÁ)
        run: |
          # BƯỚC QUYẾT ĐỊNH: Xóa hoàn toàn sự tồn tại của C++ khỏi tầm mắt của Swift
          echo "Đang tiêu diệt C++ khỏi thư mục Public..."
          cd ios/Pods/Headers/Public/IpaSigner 2>/dev/null || true
          
          # 1. Xóa vật lý các file C++ đang nằm chễm chệ ở thư mục Public
          rm -f archo.h archive.h base64.h bundle.h common.h crypto.h fs.h json.h log.h macho.h mman.h md5.h zsign_openssl.h sha1.h sha256.h signing.h sys.h timer.h util.h zip.h unzip.h ioapi.h crypt.h
          
          # 2. Xóa tên chúng khỏi danh sách Umbrella Header
          echo "Đang sửa danh sách Umbrella..."
          UMBRELLA="../../Target Support Files/IpaSigner/IpaSigner-umbrella.h"
          if [ -f "$UMBRELLA" ]; then
            sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl|zsign_openssl|sha1|sha256|signing|sys|timer|util|zip|unzip|ioapi|crypt)\.h"/d' "$UMBRELLA"
          fi
          echo "Thành công che mắt Swift!"

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
