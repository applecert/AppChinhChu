name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn của Sếp về máy Mac
        uses: actions/checkout@v4

      - name: Lắp ráp động cơ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện mẹ
        run: npm install

      - name: Nhào nặn khung xương iOS (Expo Prebuild)
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật C++ (Quy trình VIP + Cấp Chìa Khóa)
        run: |
          echo "BẮT ĐẦU VÁ LỖI C++ CHUYẾN CUỐI CÙNG..."
          cd modules/ipa-signer/ios
          
          # 1. Đổi tên tránh đụng hàng React Native
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          
          # 2. Cập nhật đường dẫn bên trong toàn bộ code C++
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          # 3. PHÁT DANH THIẾP (Để các file header không cãi nhau)
          for file in archo.h macho.h bundle.h; do
            if [ -f "$file" ] && ! grep -q "class ZSignAsset;" "$file"; then
              echo 'class ZSignAsset;' > temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          if [ -f "signing.h" ] && ! grep -q "class ZSignAsset;" "signing.h"; then
            echo '#include <stdint.h>' > temp_file
            echo '#include <string>' >> temp_file
            echo 'using namespace std;' >> temp_file
            echo 'class ZSignAsset;' >> temp_file
            cat signing.h >> temp_file
            mv temp_file signing.h
          fi
          
          # 4. CẤP CHÌA KHÓA KÉT SẮT (Chữa lỗi incomplete type ZSignAsset ở file .cpp)
          for file in archo.cpp macho.cpp bundle.cpp; do
            if [ -f "$file" ] && ! grep -q '#include "signing.h"' "$file"; then
              echo '#include "signing.h"' > temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          # 5. Tiêm mạch máu chuẩn xác cho signing.cpp
          if [ -f "signing.cpp" ]; then
            sed -i '' '/^#include "zsign_openssl\.h"$/d' signing.cpp
            echo '#include "zsign_openssl.h"' > temp_file
            cat signing.cpp >> temp_file
            mv temp_file signing.cpp
          fi
          
          # 6. Thiến lệnh system() trong util.cpp gây ngất xỉu trên iOS
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          
          # 7. Tiêu diệt zsign.cpp (Bom nổ chậm)
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          # 8. Cài CocoaPods
          cd ios
          pod install
          
          # 9. Dọn rác C++ trong Umbrella Header
          echo "🔥 BẮT ĐẦU CÀN QUÉT UMBRELLA..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Dịch code & Vượt rào Apple (Unsigned Build)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Xuất xưởng gửi file về cho Sếp tải
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
