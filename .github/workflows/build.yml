name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Rèn Vũ Khí & Phẫu thuật (TUYỆT ĐỐI AN TOÀN)
        run: |
          echo "1. ĐÚC THƯ VIỆN LIBZIP CHO IOS..."
          curl -L -o libzip.tar.gz https://github.com/nih-at/libzip/releases/download/v1.9.2/libzip-1.9.2.tar.gz
          tar -xzf libzip.tar.gz
          cd libzip-1.9.2
          sed -i '' 's/cmake_minimum_required.*/cmake_minimum_required(VERSION 3.5)/g' CMakeLists.txt
          mkdir build && cd build
          cmake .. -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_SHARED_LIBS=OFF -DENABLE_BZIP2=OFF -DENABLE_LZMA=OFF -DENABLE_ZSTD=OFF -DENABLE_OPENSSL=OFF -DCMAKE_INSTALL_PREFIX=../../modules/ipa-signer/ios/libzip_ios
          make -j4
          make install
          cd ../..
          
          echo "2. CHÈN PODSPEC VÀ HEADER KHÔNG CHẠM VÀO CODE CŨ..."
          # Đưa file zip.h ra thẳng mặt tiền, không cần khai báo đường dẫn trong Podspec
          cp modules/ipa-signer/ios/libzip_ios/include/*.h modules/ipa-signer/ios/
          
          cat << 'EOF' > patch_podspec.py
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f:
                  lines = f.readlines()
              
              # Chỉ lọc bỏ các rác do lần chạy lỗi trước để lại, KHÔNG ĐỤNG vào pod_target_xcconfig của Sếp
              clean_lines = [l for l in lines if 'OpenSSL-Universal' not in l and "s.libraries = 'z'" not in l and 'libzip.a' not in l]
              
              # Tìm đúng chữ 'end' cuối cùng để chèn an toàn
              for i in range(len(clean_lines)-1, -1, -1):
                  if clean_lines[i].strip() == 'end':
                      clean_lines.insert(i, "  s.dependency 'OpenSSL-Universal'\n  s.libraries = 'z'\n  s.vendored_libraries = 'ios/libzip_ios/lib/libzip.a'\n")
                      break
                      
              with open(pod, 'w') as f:
                  f.writelines(clean_lines)
          EOF
          python3 patch_podspec.py
          
          echo "3. XỬ LÝ ĐƯỜNG DẪN VÀ THỨ TỰ C++..."
          cd modules/ipa-signer/ios
          
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          for file in archo.h macho.h bundle.h signing.h; do
            if [ -f "$file" ]; then
              sed -i '' '/#include <set>/d' "$file"
              sed -i '' '/#include <string>/d' "$file"
              sed -i '' '/#include <vector>/d' "$file"
              sed -i '' '/using namespace std;/d' "$file"
              
              echo '#include <set>' > temp_file
              echo '#include <string>' >> temp_file
              echo '#include <vector>' >> temp_file
              echo 'using namespace std;' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          for file in archo.cpp bundle.cpp macho.cpp signing.cpp; do
            if [ -f "$file" ]; then
              sed -i '' '/#include "signing\.h"/d' "$file"
              sed -i '' '/#include "zsign_openssl\.h"/d' "$file"
              sed -i '' '/#include "common\/json\.h"/d' "$file"
              sed -i '' '/#include "macho\.h"/d' "$file"
              
              echo '#include "common/json.h"' > temp_file
              echo '#include "zsign_openssl.h"' >> temp_file
              echo '#include "macho.h"' >> temp_file
              echo '#include "signing.h"' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          echo "4. CÀI ĐẶT COCOAPODS..."
          cd ios
          pod install
          
          echo "5. DỌN DẸP UMBRELLA HEADER..."
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import "(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*)\.h"/d' {} +

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
