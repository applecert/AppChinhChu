name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ⚡ Bộ nhớ đệm (Tăng tốc độ Build tiết kiệm 7 phút)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ios/Pods
          key: ${{ runner.os }}-expo-build-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-expo-build-

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ Phẫu thuật Lõi C++ (KẸP CHẢ 2 ĐẦU - BẢO MẬT TUYỆT ĐỐI)
        run: |
          echo "1. BƠM TRỰC TIẾP THƯ VIỆN MINIZIP..."
          cd modules/ipa-signer/ios
          mkdir -p minizip
          cd minizip
          BASE_URL="https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip"
          for file in unzip.h unzip.c zip.h zip.c ioapi.h ioapi.c crypt.h; do
            curl -sLO $BASE_URL/$file
          done
          cd ..
          
          echo "2. FIX ĐƯỜNG DẪN MINIZIP CHUẨN XÁC THEO TỪNG TẦNG THƯ MỤC..."
          find . -maxdepth 1 -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<zip\.h>/"minizip\/zip.h"/g' {} +
          find . -maxdepth 1 -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<unzip\.h>/"minizip\/unzip.h"/g' {} +
          find common -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<zip\.h>/"..\/minizip\/zip.h"/g' {} +
          find common -type f \( -name "*.h" -o -name "*.cpp" \) -exec sed -i '' 's/<unzip\.h>/"..\/minizip\/unzip.h"/g' {} +

          echo "3. CẤP QUYỀN PODSPEC (SIÊU AN TOÀN)..."
          cd ../../..
          cat << 'EOF' > patch_podspec.py
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f: content = f.read()
              idx = content.rfind('end')
              if idx != -1 and 'OpenSSL-Universal' not in content:
                  content = content[:idx] + "\n  s.dependency 'OpenSSL-Universal'\n  s.libraries = 'z'\n" + content[idx:]
              with open(pod, 'w') as f: f.write(content)
          EOF
          python3 patch_podspec.py
          
          echo "4. VŨ KHÍ TỐI THƯỢNG: ĐÓNG BĂNG 100% FILE C++..."
          cd modules/ipa-signer/ios
          [ -f "openssl.h" ] && mv openssl.h zsign_openssl.h
          [ -f "openssl.cpp" ] && mv openssl.cpp zsign_openssl.cpp
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} +
          
          # Quét sạch sành sanh tất cả các file header C++ (trừ file Swift cần)
          for file in $(find . -type f -name "*.h" ! -name "IpaSignerModule.h" ! -name "IpaSignerView.h" ! -name "ZSignWrapper.h" ! -name "IpaSigner-umbrella.h"); do
            if ! grep -q "__cplusplus" "$file"; then
              echo "#ifdef __cplusplus" > temp_hdr
              echo "#include <set>" >> temp_hdr
              echo "#include <string>" >> temp_hdr
              echo "#include <vector>" >> temp_hdr
              echo "using namespace std;" >> temp_hdr
              cat "$file" >> temp_hdr
              echo "" >> temp_hdr       # <--- ĐÂY LÀ CHÌA KHÓA: Bơm thêm 1 dòng trống để ngắt đuôi code cũ
              echo "#endif" >> temp_hdr # <--- Đóng thẻ cực kỳ an toàn
              mv temp_hdr "$file"
            fi
          done
          
          echo "5. SẮP XẾP ĐƯỜNG DẪN CHUẨN TRONG FILE .CPP..."
          for file in archo.cpp bundle.cpp macho.cpp signing.cpp; do
            if [ -f "$file" ]; then
              sed -i '' '/#include "signing\.h"/d' "$file"
              sed -i '' '/#include "zsign_openssl\.h"/d' "$file"
              sed -i '' '/#include "common\/json\.h"/d' "$file"
              sed -i '' '/#include "macho\.h"/d' "$file"
              
              echo '#include "common/json.h"' > temp_file
              echo '#include "zsign_openssl.h"' >> temp_file
              echo '#include "macho.h"' >> temp_file
              echo '#include "signing.h"' >> temp_file
              cat "$file" >> temp_file
              mv temp_file "$file"
            fi
          done
          
          find . -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0; \/\/ system() disabled for iOS/g' {} +
          find . -name "zsign.cpp" -delete
          
          cd ../../..
          
          echo "6. CÀI ĐẶT COCOAPODS..."
          cd ios
          pod install
          
          echo "7. DỌN SẠCH MẶT TIỀN UMBRELLA HEADER..."
          # Đảm bảo CocoaPods có xả rác ra cũng bị quét sạch không chừa một chữ
          find Pods -type f -name "IpaSigner-umbrella.h" -exec sed -i '' -E '/#import.*(archo|archive|base64|bundle|common|crypto|fs|json|log|macho|mman|md5|openssl.*|sha.*|signing|sys|timer|util.*|zsign.*|zip|unzip|ioapi|crypt)\.h/d' {} +

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
