name: Build Unsigned IPA Expo
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Tải mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ⚡ Bộ nhớ đệm (Tăng tốc tải)
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-expo-build-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-expo-build-

      - name: Cài đặt thư viện Node
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: 🛠️ BƯỚC 1 - DỌN DẸP VÀ CHUẨN BỊ VŨ KHÍ
        run: |
          cd modules/ipa-signer/ios
          mkdir -p minizip
          cd minizip
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/unzip.h || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/unzip.c || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/zip.h || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/zip.c || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/ioapi.h || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/ioapi.c || true
          curl -sLO https://raw.githubusercontent.com/madler/zlib/master/contrib/minizip/crypt.h || true
          cd ..
          
          rm -f zsign.cpp || true
          [ -f openssl.h ] && mv openssl.h zsign_openssl.h || true
          [ -f openssl.cpp ] && mv openssl.cpp zsign_openssl.cpp || true
          
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/"openssl\.h"/"zsign_openssl.h"/g' {} + || true
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.mm" \) -exec sed -i '' 's/<openssl\.h>/"zsign_openssl.h"/g' {} + || true
          
          find . -maxdepth 1 -type f -exec sed -i '' 's/<zip\.h>/"minizip\/zip.h"/g' {} + || true
          find . -maxdepth 1 -type f -exec sed -i '' 's/<unzip\.h>/"minizip\/unzip.h"/g' {} + || true
          
          if [ -d "common" ]; then
            find common -type f -exec sed -i '' 's/<zip\.h>/"..\/minizip\/zip.h"/g' {} + || true
            find common -type f -exec sed -i '' 's/<unzip\.h>/"..\/minizip\/unzip.h"/g' {} + || true
          fi
          
          find . -type f -name "util.cpp" -exec sed -i '' 's/int status = system(.*);/int status = 0;/g' {} + || true

      - name: 🛠️ BƯỚC 2 - CẤP QUYỀN PODSPEC
        run: |
          cat << 'EOF' > patch_podspec.py
          import glob
          for pod in glob.glob('modules/**/*.podspec', recursive=True):
              with open(pod, 'r') as f: c = f.read()
              if 'OpenSSL-Universal' not in c:
                  idx = c.rfind('end')
                  if idx != -1:
                      c = c[:idx] + "\n  s.dependency 'OpenSSL-Universal'\n  s.libraries = 'z'\n" + c[idx:]
                      with open(pod, 'w') as f: f.write(c)
          EOF
          python3 patch_podspec.py

      - name: 🛠️ BƯỚC 3 - CÀI ĐẶT COCOAPODS
        run: |
          cd ios
          pod install

      - name: 💣 BƯỚC 4 - BỊT MẮT SWIFT TUYỆT ĐỐI BẰNG PYTHON (QUYẾT ĐỊNH)
        run: |
          cat << 'EOF' > clean_umbrella.py
          import os, glob

          print("--- BẮT ĐẦU CHIẾN DỊCH BỊT MẮT SWIFT ---")
          umbrella_files = glob.glob('ios/Pods/**/IpaSigner-umbrella.h', recursive=True)

          if not umbrella_files:
              print("Không tìm thấy Umbrella Header.")

          for u_file in umbrella_files:
              print(f"Phát hiện danh sách: {u_file}")
              with open(u_file, 'r') as f:
                  lines = f.readlines()
              
              with open(u_file, 'w') as f:
                  for line in lines:
                      if line.startswith('#import "') or line.startswith('#import <IpaSigner/'):
                          if 'IpaSignerModule' in line or 'IpaSignerView' in line or 'ZSignWrapper' in line or 'Expo' in line:
                              f.write(line)
                              print(f" [GIỮ AN TOÀN] {line.strip()}")
                          else:
                              print(f" [XÓA BỎ C++] {line.strip()}")
                      else:
                          f.write(line)
          print("--- CHIẾN DỊCH THÀNH CÔNG ---")
          EOF
          python3 clean_umbrella.py

      - name: Xcode Build (Unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -destination "generic/platform=iOS" -derivedDataPath ./XCodeData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ios/XCodeData/Build/Products/Release-iphoneos/*.app Payload/
          zip -r AppIPAVIET.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: File-IPA-Goc
          path: AppIPAVIET.ipa
